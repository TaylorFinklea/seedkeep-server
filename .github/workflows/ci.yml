name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: seedkeep
          POSTGRES_PASSWORD: dev-only
          POSTGRES_DB: seedkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://seedkeep:dev-only@localhost:5432/seedkeep
      # Required by loadEnv() (env schema validation) — dummy values safe for CI.
      # No real secrets: S3 not contacted, auth not exercised, Anthropic not called.
      S3_ACCESS_KEY_ID: ci-dummy-key
      S3_SECRET_ACCESS_KEY: ci-dummy-secret
      S3_BUCKET: ci-dummy-bucket
      BETTER_AUTH_SECRET: ci-better-auth-secret-32chars-xxxxx
      APPLE_CLIENT_ID: ci-apple-client
      APPLE_CLIENT_SECRET: ci-apple-secret
      # Optional vars — left unset so routes gracefully return 503 not_configured.
      # ANTHROPIC_API_KEY, APPLE_IAP_SHARED_SECRET, ASSISTANT_KEY_MASTER, ADMIN_SECRET

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Migrate
        run: bun run migrate

      - name: Unit tests (vitest)
        run: bun run test

      - name: Integration tests (bun:test)
        run: bun test tests/integration/
