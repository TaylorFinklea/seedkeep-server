# fly.toml app configuration file generated for seedkeep-server on 2026-05-05T13:58:19-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'seedkeep-server'
primary_region = 'iad'

[build]

[processes]
  app = "bun run src/server.ts"
  worker = "bun run src/worker.ts"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  # Sized for the legacy Hobby free allowance: 3x shared-cpu-1x@256mb
  # at no charge. Bun + Hono + postgres.js fit comfortably under that.
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
